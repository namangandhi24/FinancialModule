name: finpilot

services:
  postgres:
    image: postgres:16-alpine
    container_name: finpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finpilot
      POSTGRES_PASSWORD: finpilot
      POSTGRES_DB: finpilot
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finpilot -d finpilot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: finpilot-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  ollama:
    image: ollama/ollama:latest
    container_name: finpilot-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ai

volumes:
  postgres_data:
  redis_data:
  ollama_data:
