name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finpilot
          POSTGRES_PASSWORD: finpilot
          POSTGRES_DB: finpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - run: pnpm --filter @finpilot/shared build

      - name: Generate Prisma client
        run: pnpm --filter @finpilot/api db:generate
        env:
          DATABASE_URL: postgresql://finpilot:finpilot@localhost:5432/finpilot

      - run: pnpm lint

      - run: pnpm typecheck

      - name: Run migrations
        run: pnpm --filter @finpilot/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://finpilot:finpilot@localhost:5432/finpilot

      - run: pnpm build
